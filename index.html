<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Imamio</title>
<meta name="theme-color" content="#1B2A41">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=PT+Sans:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100%;
  background: #EFF0EB;
  color: #1B2A41;
  font-family: 'PT Sans', -apple-system, sans-serif;
}
.app { max-width: 520px; margin: 0 auto; padding: env(safe-area-inset-top) 14px 40px; }
.hdr { display: flex; align-items: flex-end; justify-content: space-between; padding: 22px 2px 14px; }
.hdr-date { display: flex; align-items: center; gap: 10px; }
.hdr-day { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 44px; line-height: 1; color: #C8102E; }
.hdr-meta { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.hdr-wd { color: #7C8694; font-weight: 400; text-transform: none; letter-spacing: 0; }
.hdr-title { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 18px; letter-spacing: .24em; padding-bottom: 4px; }
.tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; position: sticky; top: 0; background: #EFF0EB; padding: 6px 0 10px; z-index: 5; }
.tab { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: .05em; text-transform: uppercase; padding: 9px 0; border: 1.5px solid #1B2A41; background: transparent; color: #1B2A41; cursor: pointer; border-radius: 4px; }
.tab.on { background: #1B2A41; color: #fff; }
.body { display: flex; flex-direction: column; gap: 12px; }
.card { background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 1px 2px rgba(27,42,65,.08); }
.card-h { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
.card-h.red { color: #C8102E; }
.alert { border-left: 4px solid #C8102E; }
.empty { color: #7C8694; font-size: 14px; padding: 10px 2px; }
.ev { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #EFF0EB; }
.ev:last-child { border-bottom: none; }
.ev.done .ev-title { text-decoration: line-through; color: #7C8694; }
.check { width: 26px; height: 26px; min-width: 26px; border: 1.5px solid #1B2A41; border-radius: 50%; background: transparent; cursor: pointer; font-size: 14px; color: #1F7A4D; font-weight: 700; }
.ev-mark { width: 3px; align-self: stretch; border-radius: 2px; }
.ev-body { flex: 1; min-width: 0; }
.ev-title { font-size: 15px; font-weight: 700; overflow-wrap: anywhere; }
.ev-meta { font-size: 12.5px; color: #7C8694; }
.x { border: none; background: transparent; color: #7C8694; font-size: 22px; cursor: pointer; padding: 2px 8px; line-height: 1; }
.link { border: none; background: transparent; color: #C8102E; font-size: 13.5px; font-weight: 700; cursor: pointer; padding: 6px 0 0; text-align: left; }
.btn-main { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 15px; letter-spacing: .05em; background: #C8102E; color: #fff; border: none; border-radius: 6px; padding: 13px 18px; cursor: pointer; width: 100%; }
.btn-ghost { font-family: 'Oswald', sans-serif; font-size: 14px; background: transparent; border: 1.5px solid #B9BFC7; color: #1B2A41; border-radius: 6px; padding: 10px 16px; cursor: pointer; }
.form { display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
.inp { font-family: 'PT Sans', sans-serif; font-size: 16px; border: 1.5px solid #B9BFC7; border-radius: 6px; padding: 10px 12px; width: 100%; background: #fff; color: #1B2A41; }
.inp:focus { outline: 2px solid #1B2A41; outline-offset: 1px; }
.area { resize: vertical; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { font-family: 'PT Sans', sans-serif; font-size: 13.5px; font-weight: 700; border: 1.5px solid #B9BFC7; background: #fff; color: #1B2A41; border-radius: 20px; padding: 8px 15px; cursor: pointer; }
.chip.on { color: #fff; }
.fin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.fin-l { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #7C8694; }
.fin-v { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 19px; margin-top: 2px; }
.green { color: #1F7A4D; }
.red { color: #C8102E; }
.month-nav { display: flex; align-items: center; justify-content: space-between; }
.month-name { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 17px; text-transform: uppercase; letter-spacing: .06em; }
.bar-row { margin-bottom: 10px; }
.bar-top { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 3px; }
.bar-sum { font-weight: 700; }
.bar-track { height: 8px; background: #EFF0EB; border-radius: 4px; }
.bar-fill { height: 100%; background: #C8102E; border-radius: 4px; }
.tx { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #EFF0EB; }
.tx:last-child { border-bottom: none; }
.tx-body { flex: 1; min-width: 0; }
.tx-cat { font-size: 15px; font-weight: 700; }
.tx-meta { font-size: 12.5px; color: #7C8694; overflow-wrap: anywhere; }
.tx-sum { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 15.5px; white-space: nowrap; }
.note-text { font-size: 15px; white-space: pre-wrap; overflow-wrap: anywhere; }
.note-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12.5px; color: #7C8694; }
.foot { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
.foot button { font-size: 12.5px; color: #7C8694; background: transparent; border: none; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="hdr-date">
      <div class="hdr-day" id="h-day"></div>
      <div class="hdr-meta">
        <div id="h-month"></div>
        <div class="hdr-wd" id="h-wd"></div>
      </div>
    </div>
    <div class="hdr-title">IMAMIO</div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main class="body" id="body"></main>
  <div class="foot">
    <button onclick="exportData()">Экспорт данных</button>
    <button onclick="document.getElementById('imp').click()">Импорт</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<script>
/* ---------- данные ---------- */
const KEY = 'imamio-data-v1';
let S = { events: [], tx: [], notes: [] };
try { const raw = localStorage.getItem(KEY); if (raw) S = Object.assign({ events: [], tx: [], notes: [] }, JSON.parse(raw)); } catch (e) {}
function save() { try { localStorage.setItem(KEY, JSON.stringify(S)); } catch (e) { alert('Не удалось сохранить данные'); } }

/* ---------- утилиты ---------- */
const TYPES = { meeting: { label: 'Встреча', color: '#C8102E' }, task: { label: 'Задача', color: '#1B2A41' }, deadline: { label: 'Дедлайн', color: '#B96A00' } };
const EXP_CATS = ['Еда','Транспорт','Жильё','Связь','Учёба','Одежда','Здоровье','Развлечения','Прочее'];
const INC_CATS = ['Зарплата','Стипендия','Подработка','Перевод','Прочее'];
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_S = ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const WD = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const money = n => new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(n) + ' \u20BD';
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function todayStr() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
const mKey = ds => ds.slice(0, 7);
function dHuman(ds) { const [y,m,d] = ds.split('-').map(Number); return d + ' ' + MONTHS_S[m-1]; }

/* ---------- состояние интерфейса ---------- */
let tab = 'today';
let evFormOpen = false, txFormOpen = false, txType = 'expense', evType = 'meeting', showDone = false;
let MK = mKey(todayStr());

/* ---------- шапка ---------- */
(function () {
  const now = new Date();
  document.getElementById('h-day').textContent = now.getDate();
  document.getElementById('h-month').textContent = MONTHS[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('h-wd').textContent = WD[now.getDay()];
})();

/* ---------- рендер ---------- */
function setTab(t) { tab = t; render(); window.scrollTo(0, 0); }

function render() {
  document.getElementById('tabs').innerHTML = [['today','Сегодня'],['plan','Дела'],['money','Финансы'],['notes','Заметки']]
    .map(([k, l]) => `<button class="tab${tab === k ? ' on' : ''}" onclick="setTab('${k}')">${l}</button>`).join('');
  const b = document.getElementById('body');
  if (tab === 'today') b.innerHTML = rToday();
  else if (tab === 'plan') b.innerHTML = rPlan();
  else if (tab === 'money') b.innerHTML = rMoney();
  else b.innerHTML = rNotes();
}

function evRow(e, opts = {}) {
  const t = TYPES[e.type] || TYPES.task;
  return `<div class="ev${e.done ? ' done' : ''}">
    <button class="check" onclick="toggleEvent('${e.id}')" aria-label="Отметить">${e.done ? '\u2713' : ''}</button>
    <div class="ev-mark" style="background:${t.color}"></div>
    <div class="ev-body">
      <div class="ev-title">${esc(e.title)}</div>
      <div class="ev-meta">${t.label}${opts.date ? ' \u00B7 ' + dHuman(e.date) : ''}${e.time ? ' \u00B7 ' + e.time : ''}</div>
    </div>
    ${opts.del ? `<button class="x" onclick="delEvent('${e.id}')" aria-label="Удалить">\u00D7</button>` : ''}
  </div>`;
}

/* ----- Сегодня ----- */
function rToday() {
  const T = todayStr();
  const overdue = S.events.filter(e => !e.done && e.date < T);
  const today = S.events.filter(e => e.date === T && !e.done).sort((a, b) => (a.time || '99').localeCompare(b.time || '99'));
  const mtx = S.tx.filter(t => mKey(t.date) === mKey(T));
  const inc = mtx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = mtx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  let h = '';
  if (overdue.length) {
    h += `<section class="card alert"><div class="card-h red">Просрочено \u00B7 ${overdue.length}</div>` +
      overdue.slice(0, 5).map(e => evRow(e, { date: true })).join('') +
      (overdue.length > 5 ? `<button class="link" onclick="setTab('plan')">показать все \u2192</button>` : '') + '</section>';
  }
  h += `<section class="card"><div class="card-h">План на сегодня</div>` +
    (today.length ? today.map(e => evRow(e)).join('') : `<div class="empty">На сегодня ничего не запланировано.</div>`) + '</section>';
  h += `<section class="card"><div class="card-h">Финансы за месяц</div>
    <div class="fin-grid">
      <div><div class="fin-l">Доход</div><div class="fin-v green">${money(inc)}</div></div>
      <div><div class="fin-l">Расход</div><div class="fin-v red">${money(exp)}</div></div>
      <div><div class="fin-l">Баланс</div><div class="fin-v">${money(inc - exp)}</div></div>
    </div>
    <button class="link" onclick="setTab('money')">подробнее \u2192</button></section>`;
  return h;
}

/* ----- Дела ----- */
function rPlan() {
  const T = todayStr();
  let h = '';
  if (!evFormOpen) {
    h += `<button class="btn-main" onclick="evFormOpen=true;render();setTimeout(()=>{var i=document.getElementById('ev-title');if(i)i.focus()},50)">+ Новое дело</button>`;
  } else {
    h += `<section class="card form">
      <input class="inp" id="ev-title" placeholder="Что нужно сделать?">
      <div class="row">
        <input class="inp" id="ev-date" type="date" value="${T}">
        <input class="inp" id="ev-time" type="time">
      </div>
      <div class="chips">` +
      Object.entries(TYPES).map(([k, v]) =>
        `<button class="chip${evType === k ? ' on' : ''}" style="${evType === k ? 'background:' + v.color + ';border-color:' + v.color : ''}" onclick="evType='${k}';keepEvForm();render();restoreEvForm()">${v.label}</button>`).join('') +
      `</div>
      <div class="row">
        <button class="btn-main" onclick="submitEvent()">Добавить</button>
        <button class="btn-ghost" onclick="evFormOpen=false;render()">Отмена</button>
      </div>
    </section>`;
  }
  const active = S.events.filter(e => !e.done).sort((a, b) => a.date.localeCompare(b.date) || (a.time || '99').localeCompare(b.time || '99'));
  const groups = [['Просрочено', active.filter(e => e.date < T)], ['Сегодня', active.filter(e => e.date === T)], ['Скоро', active.filter(e => e.date > T)]];
  for (const [name, list] of groups) {
    if (!list.length) continue;
    h += `<section class="card"><div class="card-h${name === 'Просрочено' ? ' red' : ''}">${name} \u00B7 ${list.length}</div>` +
      list.map(e => evRow(e, { del: true, date: name !== 'Сегодня' })).join('') + '</section>';
  }
  if (!active.length) h += `<div class="empty">Пока пусто — добавь первое дело.</div>`;
  const done = S.events.filter(e => e.done);
  if (done.length) {
    h += `<section class="card"><button class="link" onclick="showDone=!showDone;render()">${showDone ? 'скрыть выполненные' : 'выполненные (' + done.length + ')'}</button>` +
      (showDone ? done.map(e => evRow(e, { del: true, date: true })).join('') : '') + '</section>';
  }
  return h;
}

let _evKeep = {};
function keepEvForm() {
  _evKeep = {
    title: (document.getElementById('ev-title') || {}).value || '',
    date: (document.getElementById('ev-date') || {}).value || todayStr(),
    time: (document.getElementById('ev-time') || {}).value || ''
  };
}
function restoreEvForm() {
  if (document.getElementById('ev-title')) {
    document.getElementById('ev-title').value = _evKeep.title || '';
    document.getElementById('ev-date').value = _evKeep.date || todayStr();
    document.getElementById('ev-time').value = _evKeep.time || '';
  }
}
function submitEvent() {
  const title = document.getElementById('ev-title').value.trim();
  const date = document.getElementById('ev-date').value;
  const time = document.getElementById('ev-time').value;
  if (!title || !date) return;
  S.events.push({ id: uid(), title, date, time, type: evType, done: false });
  save(); evFormOpen = false; render();
}
function toggleEvent(id) { const e = S.events.find(e => e.id === id); if (e) { e.done = !e.done; save(); render(); } }
function delEvent(id) { S.events = S.events.filter(e => e.id !== id); save(); render(); }

/* ----- Финансы ----- */
function rMoney() {
  const [y, m] = MK.split('-').map(Number);
  const mtx = S.tx.filter(t => mKey(t.date) === MK).sort((a, b) => b.date.localeCompare(a.date));
  const inc = mtx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = mtx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const cats = {};
  mtx.filter(t => t.type === 'expense').forEach(t => { cats[t.category] = (cats[t.category] || 0) + t.amount; });
  const byCat = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  let h = `<div class="month-nav">
    <button class="btn-ghost" onclick="shiftMonth(-1)">\u2190</button>
    <div class="month-name">${MONTHS[m - 1]} ${y}</div>
    <button class="btn-ghost" onclick="shiftMonth(1)">\u2192</button>
  </div>
  <section class="card"><div class="fin-grid">
    <div><div class="fin-l">Доход</div><div class="fin-v green">${money(inc)}</div></div>
    <div><div class="fin-l">Расход</div><div class="fin-v red">${money(exp)}</div></div>
    <div><div class="fin-l">Баланс</div><div class="fin-v">${money(inc - exp)}</div></div>
  </div></section>`;

  if (!txFormOpen) {
    h += `<button class="btn-main" onclick="txFormOpen=true;render();setTimeout(()=>{var i=document.getElementById('tx-sum');if(i)i.focus()},50)">+ Записать операцию</button>`;
  } else {
    const catList = txType === 'expense' ? EXP_CATS : INC_CATS;
    h += `<section class="card form">
      <div class="chips">
        <button class="chip${txType === 'expense' ? ' on' : ''}" style="${txType === 'expense' ? 'background:#C8102E;border-color:#C8102E' : ''}" onclick="txType='expense';keepTxForm();render();restoreTxForm()">Расход</button>
        <button class="chip${txType === 'income' ? ' on' : ''}" style="${txType === 'income' ? 'background:#1F7A4D;border-color:#1F7A4D' : ''}" onclick="txType='income';keepTxForm();render();restoreTxForm()">Доход</button>
      </div>
      <div class="row">
        <input class="inp" id="tx-sum" inputmode="decimal" placeholder="Сумма, \u20BD">
        <input class="inp" id="tx-date" type="date" value="${todayStr()}">
      </div>
      <input class="inp" id="tx-cat" list="cats" placeholder="Категория">
      <datalist id="cats">${catList.map(c => `<option value="${c}">`).join('')}</datalist>
      <input class="inp" id="tx-note" placeholder="Комментарий (необязательно)">
      <div class="row">
        <button class="btn-main" onclick="submitTx()">Записать</button>
        <button class="btn-ghost" onclick="txFormOpen=false;render()">Отмена</button>
      </div>
    </section>`;
  }

  if (byCat.length) {
    h += `<section class="card"><div class="card-h">Расходы по категориям</div>` +
      byCat.map(([c, s]) => `<div class="bar-row">
        <div class="bar-top"><span>${esc(c)}</span><span class="bar-sum">${money(s)}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, s / byCat[0][1] * 100)}%"></div></div>
      </div>`).join('') + '</section>';
  }

  h += `<section class="card"><div class="card-h">Операции</div>` +
    (mtx.length ? mtx.map(t => `<div class="tx">
      <div class="tx-body">
        <div class="tx-cat">${esc(t.category)}</div>
        <div class="tx-meta">${dHuman(t.date)}${t.note ? ' \u00B7 ' + esc(t.note) : ''}</div>
      </div>
      <div class="tx-sum ${t.type === 'income' ? 'green' : 'red'}">${t.type === 'income' ? '+' : '\u2212'}${money(t.amount)}</div>
      <button class="x" onclick="delTx('${t.id}')" aria-label="Удалить">\u00D7</button>
    </div>`).join('') : `<div class="empty">В этом месяце записей нет.</div>`) + '</section>';
  return h;
}

let _txKeep = {};
function keepTxForm() {
  _txKeep = {
    sum: (document.getElementById('tx-sum') || {}).value || '',
    date: (document.getElementById('tx-date') || {}).value || todayStr(),
    note: (document.getElementById('tx-note') || {}).value || ''
  };
}
function restoreTxForm() {
  if (document.getElementById('tx-sum')) {
    document.getElementById('tx-sum').value = _txKeep.sum || '';
    document.getElementById('tx-date').value = _txKeep.date || todayStr();
    document.getElementById('tx-note').value = _txKeep.note || '';
  }
}
function shiftMonth(d) {
  const [y, m] = MK.split('-').map(Number);
  const nd = new Date(y, m - 1 + d, 1);
  MK = nd.getFullYear() + '-' + String(nd.getMonth() + 1).padStart(2, '0');
  render();
}
function submitTx() {
  const amount = Math.abs(parseFloat(document.getElementById('tx-sum').value.replace(',', '.')));
  const date = document.getElementById('tx-date').value;
  const category = document.getElementById('tx-cat').value.trim() || 'Прочее';
  const note = document.getElementById('tx-note').value.trim();
  if (!amount || isNaN(amount) || !date) return;
  S.tx.push({ id: uid(), type: txType, amount, category, date, note });
  save(); txFormOpen = false; render();
}
function delTx(id) { S.tx = S.tx.filter(t => t.id !== id); save(); render(); }

/* ----- Заметки ----- */
function rNotes() {
  let h = `<section class="card form">
    <textarea class="inp area" id="note-text" rows="3" placeholder="Быстрая заметка…"></textarea>
    <button class="btn-main" onclick="submitNote()">Сохранить</button>
  </section>`;
  h += S.notes.length ? S.notes.map(n => `<section class="card">
    <div class="note-text">${esc(n.text)}</div>
    <div class="note-foot"><span>${dHuman(n.created)}</span><button class="x" onclick="delNote('${n.id}')" aria-label="Удалить">\u00D7</button></div>
  </section>`).join('') : `<div class="empty">Заметок пока нет.</div>`;
  return h;
}
function submitNote() {
  const t = document.getElementById('note-text').value.trim();
  if (!t) return;
  S.notes.unshift({ id: uid(), text: t, created: todayStr() });
  save(); render();
}
function delNote(id) { S.notes = S.notes.filter(n => n.id !== id); save(); render(); }

/* ----- экспорт / импорт ----- */
function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'imamio-backup-' + todayStr() + '.json';
  a.click();
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      if (d && Array.isArray(d.events)) { S = Object.assign({ events: [], tx: [], notes: [] }, d); save(); render(); alert('Данные восстановлены'); }
      else alert('Неверный формат файла');
    } catch (e) { alert('Не удалось прочитать файл'); }
  };
  r.readAsText(file);
  ev.target.value = '';
}

/* ----- офлайн (service worker) ----- */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

render();
</script>
</body>
</html>
