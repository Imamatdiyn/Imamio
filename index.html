<!DOCTYPE html> 
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Imamio</title>
<meta name="theme-color" content="#1B2A41">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* Шрифты системные — приложение не обращается в сеть. Если у пользователя
   установлены Oswald / PT Sans, они применятся; иначе — системный аналог. */
:root {
  --bg: #EFF0EB; --card: #ffffff; --ink: #1B2A41; --muted: #7C8694; --line: #EFF0EB;
  --red: #C8102E; --green: #1F7A4D; --amber: #B96A00; --border: #B9BFC7; --track: #EFF0EB;
  --shadow: rgba(27,42,65,.08); --sheet: #ffffff;
}
[data-theme="dark"] {
  --bg: #12161F; --card: #1B2230; --ink: #E8EAF0; --muted: #8B93A3; --line: #262E3D;
  --red: #E4344F; --green: #35A96B; --amber: #D98A2B; --border: #39445A; --track: #262E3D;
  --shadow: rgba(0,0,0,.35); --sheet: #1B2230;
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { min-height: 100%; background: var(--bg); color: var(--ink); font-family: 'PT Sans', -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif; transition: background .2s, color .2s; }
.app { max-width: 520px; margin: 0 auto; padding: env(safe-area-inset-top) 14px 90px; }
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 18px 2px 12px; gap: 10px; }
.burger { background: transparent; border: none; cursor: pointer; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
.burger span { width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
.hdr-mid { flex: 1; display: flex; align-items: baseline; gap: 8px; }
.hdr-day { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 30px; line-height: 1; color: var(--red); }
.hdr-sub { font-size: 12px; color: var(--muted); }
.hdr-title { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: .22em; }
.tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; position: sticky; top: 0; background: var(--bg); padding: 6px 0 10px; z-index: 5; }
.tab { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 11.5px; letter-spacing: .02em; text-transform: uppercase; padding: 9px 0; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; border-radius: 4px; }
.tab.on { background: var(--ink); color: var(--bg); }
.body { display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--card); border-radius: 8px; padding: 14px; box-shadow: 0 1px 2px var(--shadow); }
.card-h { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
.card-h.red { color: var(--red); }
.card-h.row-between { display: flex; justify-content: space-between; align-items: center; }
.alert { border-left: 4px solid var(--red); }
.empty { color: var(--muted); font-size: 14px; padding: 10px 2px; }
.ev { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--line); }
.ev:last-child { border-bottom: none; }
.ev.done .ev-title { text-decoration: line-through; color: var(--muted); }
.check { width: 26px; height: 26px; min-width: 26px; border: 1.5px solid var(--ink); border-radius: 50%; background: transparent; cursor: pointer; font-size: 14px; color: var(--green); font-weight: 700; }
.ev-mark { width: 3px; align-self: stretch; border-radius: 2px; min-height: 30px; }
.ev-body { flex: 1; min-width: 0; }
.ev-title { font-size: 15px; font-weight: 700; overflow-wrap: anywhere; }
.ev-meta { font-size: 12.5px; color: var(--muted); }
.icon-btn { border: none; background: transparent; color: var(--muted); font-size: 16px; cursor: pointer; padding: 2px 5px; line-height: 1; }
.x { border: none; background: transparent; color: var(--muted); font-size: 22px; cursor: pointer; padding: 2px 6px; line-height: 1; }
.link { border: none; background: transparent; color: var(--red); font-size: 13.5px; font-weight: 700; cursor: pointer; padding: 6px 0 0; text-align: left; }
.btn-main { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 15px; letter-spacing: .05em; background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 13px 18px; cursor: pointer; width: 100%; }
.btn-ghost { font-family: 'Oswald', sans-serif; font-size: 14px; background: transparent; border: 1.5px solid var(--border); color: var(--ink); border-radius: 6px; padding: 10px 16px; cursor: pointer; }
.form { display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }
.inp, .sel { font-family: 'PT Sans', sans-serif; font-size: 16px; border: 1.5px solid var(--border); border-radius: 6px; padding: 10px 12px; width: 100%; background: var(--card); color: var(--ink); }
.inp:focus, .sel:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
.area { resize: vertical; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { font-family: 'PT Sans', sans-serif; font-size: 13.5px; font-weight: 700; border: 1.5px solid var(--border); background: transparent; color: var(--ink); border-radius: 20px; padding: 8px 15px; cursor: pointer; }
.chip.on { color: #fff; background: var(--ink); border-color: var(--ink); }
.fin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.fin-l { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.fin-v { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 18px; margin-top: 2px; }
.green { color: var(--green); }
.red { color: var(--red); }
.month-nav { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.month-name { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 16px; text-transform: uppercase; letter-spacing: .05em; text-align: center; flex: 1; }
.bar-row { margin-bottom: 10px; }
.bar-top { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 3px; }
.bar-sum { font-weight: 700; }
.bar-track { height: 8px; background: var(--track); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--red); border-radius: 4px; }
.bar-fill.g { background: var(--green); }
.bar-fill.over { background: var(--amber); }
.tx { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--line); }
.tx:last-child { border-bottom: none; }
.tx-body { flex: 1; min-width: 0; }
.tx-cat { font-size: 15px; font-weight: 700; }
.tx-meta { font-size: 12.5px; color: var(--muted); overflow-wrap: anywhere; }
.tx-sum { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 15.5px; white-space: nowrap; }
.note-text { font-size: 15px; white-space: pre-wrap; overflow-wrap: anywhere; }
.note-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 12.5px; color: var(--muted); }
/* календарь */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-wd { text-align: center; font-size: 11px; color: var(--muted); text-transform: uppercase; padding: 4px 0; font-weight: 700; }
.cal-cell { aspect-ratio: 1; border: none; background: transparent; border-radius: 6px; cursor: pointer; position: relative; font-family: 'PT Sans', sans-serif; font-size: 14px; color: var(--ink); display: flex; align-items: center; justify-content: center; }
.cal-cell:disabled { cursor: default; }
.cal-cell.today { outline: 1.5px solid var(--red); }
.cal-cell.sel { background: var(--ink); color: var(--bg); }
.cal-cell.other { color: var(--border); }
.cal-dots { position: absolute; bottom: 3px; left: 0; right: 0; display: flex; justify-content: center; gap: 2px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }
/* профили */
.p-screen { display: flex; flex-direction: column; align-items: center; padding-top: 8vh; gap: 18px; }
.p-logo { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 34px; letter-spacing: .3em; }
.p-logo span { color: var(--red); }
.p-sub { color: var(--muted); font-size: 14px; }
.p-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
.p-btn { display: flex; align-items: center; gap: 12px; background: var(--card); border: none; border-radius: 8px; padding: 14px; cursor: pointer; box-shadow: 0 1px 2px var(--shadow); }
.p-ava { width: 42px; height: 42px; border-radius: 50%; background: var(--ink); color: var(--bg); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 600; }
.p-name { font-size: 16px; font-weight: 700; color: var(--ink); flex: 1; text-align: left; }
.p-lock { color: var(--muted); font-size: 14px; }
/* меню */
.drawer-back { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 30; }
.drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 82%; max-width: 340px; background: var(--card); z-index: 31; padding: calc(env(safe-area-inset-top) + 20px) 18px 24px; overflow-y: auto; box-shadow: 2px 0 20px rgba(0,0,0,.25); animation: slidein .18s ease; }
@keyframes slidein { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.drawer h2 { font-family: 'Oswald', sans-serif; font-size: 22px; letter-spacing: .2em; margin-bottom: 2px; }
.drawer h2 span { color: var(--red); }
.drawer .ver { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
.m-sec { font-family: 'Oswald', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 18px 0 8px; }
.m-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 15px; }
.m-item:last-child { border-bottom: none; }
.m-val { color: var(--muted); font-size: 14px; }
.seg { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 4px; }
.seg button { flex: 1; min-width: 60px; font-size: 13px; padding: 8px 6px; border: 1.5px solid var(--border); background: transparent; color: var(--ink); border-radius: 6px; cursor: pointer; font-family: 'PT Sans', sans-serif; }
.seg button.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.toggle { width: 46px; height: 26px; border-radius: 14px; background: var(--border); position: relative; transition: background .15s; border: none; cursor: pointer; }
.toggle.on { background: var(--green); }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: left .15s; }
.toggle.on::after { left: 23px; }
.kk-note { background: var(--track); border-radius: 6px; padding: 10px; font-size: 12.5px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
/* голос */
.voice-fab { position: fixed; bottom: 22px; left: 50%; margin-left: 172px; width: 58px; height: 58px; border-radius: 50%; background: var(--red); color: #fff; border: none; box-shadow: 0 4px 14px rgba(200,16,46,.4); cursor: pointer; font-size: 24px; z-index: 20; display: none; align-items: center; justify-content: center; }
.voice-fab.mio { box-shadow: 0 0 0 0 rgba(31,122,77,.5); animation: vpulse 1.6s infinite; background: var(--green); }
@media (max-width: 540px) { .voice-fab { left: auto; right: 18px; margin-left: 0; } }
.voice-back { position: fixed; inset: 0; background: rgba(27,42,65,.55); z-index: 25; display: flex; align-items: flex-end; justify-content: center; }
.voice-sheet { background: var(--sheet); width: 100%; max-width: 520px; border-radius: 16px 16px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); }
.voice-mic { width: 66px; height: 66px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 28px; margin: 4px auto 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.voice-mic.on { animation: vpulse 1.2s infinite; }
@keyframes vpulse { 0% { box-shadow: 0 0 0 0 rgba(200,16,46,.5); } 70% { box-shadow: 0 0 0 18px rgba(200,16,46,0); } 100% { box-shadow: 0 0 0 0 rgba(200,16,46,0); } }
.voice-status { text-align: center; color: var(--muted); font-size: 13.5px; margin-bottom: 10px; }
.voice-trans { font-size: 17px; font-weight: 700; text-align: center; min-height: 24px; margin-bottom: 14px; overflow-wrap: anywhere; }
.voice-summary { background: var(--track); border-radius: 8px; padding: 12px 14px; font-size: 14.5px; margin-bottom: 12px; line-height: 1.5; }
.voice-summary b { font-family: 'Oswald', sans-serif; font-weight: 600; }
.voice-hint { font-size: 12.5px; color: var(--muted); margin-top: 12px; text-align: center; line-height: 1.6; }
.voice-hint code { background: var(--track); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
/* тост */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 12px 16px; border-radius: 8px; font-size: 14px; display: flex; align-items: center; gap: 14px; z-index: 40; box-shadow: 0 4px 14px rgba(0,0,0,.3); max-width: 90%; }
.toast button { background: transparent; border: none; color: var(--red); font-weight: 700; cursor: pointer; font-size: 14px; }
[data-theme="dark"] .toast button { color: #FF7A8C; }
/* прогресс цели */
.goal { padding: 12px 0; border-bottom: 1px solid var(--line); }
.goal:last-child { border-bottom: none; }
.goal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.goal-title { font-size: 15px; font-weight: 700; }
.goal-btns { display: flex; gap: 6px; margin-top: 8px; }
.goal-btns button { border: 1.5px solid var(--border); background: transparent; color: var(--ink); border-radius: 6px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
.weather { display: flex; align-items: center; gap: 10px; }
.weather-t { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 600; }
.search-res-h { font-family: 'Oswald', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 12px 0 4px; }
</style>

function dHuman(ds){const p=ds.split('-').map(Number);const y=p[0],m=p[1],d=p[2];const cy=new Date().getFullYear();
  if(LANG==='zh')return (y!==cy?y+'年':'')+m+'月'+d+'日';
  if(LANG==='en')return MON_S.en[m-1]+' '+d+(y!==cy?' '+y:'');
  return d+' '+MON_S[LANG][m-1]+(y!==cy?' '+y:'');}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

/* ============================================================
   ПОВТОРЯЮЩИЕСЯ СОБЫТИЯ (виртуальное разворачивание)
   ============================================================ */
function stepDate(ds,recur){const [y,m,d]=ds.split('-').map(Number);const dt=new Date(y,m-1,d);
  if(recur==='daily')dt.setDate(dt.getDate()+1);
  else if(recur==='weekly')dt.setDate(dt.getDate()+7);
  else if(recur==='monthly')dt.setMonth(dt.getMonth()+1);
  return dt.getFullYear()+'-'+vpad(dt.getMonth()+1)+'-'+vpad(dt.getDate());}
function occDone(ev,occDate){return ev.recur?(ev.doneDates||[]).includes(occDate):ev.done;}
// возвращает occ-объекты {id,baseId,title,date,time,type,remind,recur,done} в диапазоне
function expandRange(from,to){
  const out=[];
  for(const ev of S.events){
    if(!ev.recur){ if(ev.date>=from&&ev.date<=to)out.push(occFrom(ev,ev.date)); continue; }
    let d=ev.date, guard=0;
    while(d<=to&&guard<500){ if(d>=from)out.push(occFrom(ev,d)); d=stepDate(d,ev.recur); guard++; }
  }
  return out;
}
function occFrom(ev,date){return {id:ev.recur?ev.id+'@'+date:ev.id,baseId:ev.id,title:ev.title,date,time:ev.time,type:ev.type,remind:ev.remind,recur:ev.recur,done:occDone(ev,date)};}

/* ============================================================
   РЕГУЛЯРНЫЕ ПЛАТЕЖИ → проводим в операции
   ============================================================ */
function postRecurring(){
  const nowYM=mKey(todayStr()); let changed=false;
  for(const r of S.recurTx){
    let [sy,sm]=(r.start||nowYM).split('-').map(Number);
    let [ny,nm]=nowYM.split('-').map(Number);
    let months=(ny-sy)*12+(nm-sm); if(months<0)continue; if(months>36)months=36;
    for(let i=0;i<=months;i++){
      const dt=new Date(sy,sm-1+i,1); const ym=dt.getFullYear()+'-'+vpad(dt.getMonth()+1);
      const key='r:'+r.id+':'+ym;
      if(S.tx.some(x=>x.id===key))continue;
      const dim=daysInMonth(dt.getFullYear(),dt.getMonth()+1);
      const day=vpad(Math.min(r.day||1,dim));
      S.tx.push({id:key,type:r.type,amount:r.amount,category:r.category,date:ym+'-'+day,note:r.note||'',fromRecur:r.id});
      changed=true;
    }
  }
  if(changed)save();
}

function rToday(){
  const Td=todayStr(),h24=new Date().getHours();
  const greet=h24<12?t('summaryHi'):(h24<18?t('summaryDay'):t('summaryEve'));
  const overdue=S.events.filter(e=>!e.recur&&!e.done&&e.date<Td).map(e=>occFrom(e,e.date));
  const today=expandRange(Td,Td).filter(e=>!e.done).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
  const wkEnd=vShiftDate(7);
  const week=expandRange(vShiftDate(1),wkEnd).filter(e=>!e.done).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'99').localeCompare(b.time||'99'));
  const mtx=S.tx.filter(x=>mKey(x.date)===mKey(Td));
  const inc=mtx.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=mtx.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const prof=profiles.find(p=>p.id===CUR);

  let h=`<section class="card"><div class="card-h">${greet}, ${esc(prof.name)}</div><div style="font-size:15px">${line}.</div>`;

  if(overdue.length)h+=`<section class="card alert"><div class="card-h red">${t('overdue')} \u00B7 ${overdue.length}</div>`+overdue.slice(0,5).map(e=>evRow(e,{date:true})).join('')+(overdue.length>5?`<button class="link" onclick="setTab('plan')">${t('showAll')} \u2192</button>`:'')+`</section>`;
  h+=`<section class="card"><div class="card-h">${t('todayPlan')}</div>`+(today.length?today.map(e=>evRow(e)).join(''):`<div class="empty">${t('nothingToday')}</div>`)+`</section>`;
  if(week.length)h+=`<section class="card"><div class="card-h">${t('next7')}</div>`+week.slice(0,6).map(e=>evRow(e,{date:true})).join('')+`</section>`;
  h+=`<section class="card"><div class="card-h">${t('monthFinance')}</div><div class="fin-grid">

function rCal(){
  const Td=todayStr();
  const first=new Date(calY,calM,1); const startShift=(first.getDay()+6)%7; const dim=daysInMonth(calY,calM+1); const daysPrev=daysInMonth(calY,calM);
  const monStart=calY+'-'+vpad(calM+1)+'-01', monEnd=calY+'-'+vpad(calM+1)+'-'+vpad(dim);
  const occ=expandRange(monStart,monEnd).filter(e=>!e.done);
  const byDate={}; for(const e of occ)(byDate[e.date]=byDate[e.date]||[]).push(e);
  let cells=''; const total=Math.ceil((startShift+dim)/7)*7;
  for(let i=0;i<total;i++){const dn=i-startShift+1;let ds=null,label,other=false;
    if(dn<1){label=daysPrev+dn;other=true;}else if(dn>dim){label=dn-dim;other=true;}else{label=dn;ds=calY+'-'+vpad(calM+1)+'-'+vpad(dn);}
    if(!ds){cells+=`<button class="cal-cell other" disabled>${label}</button>`;continue;}
    const dots=(byDate[ds]||[]).slice(0,3).map(e=>`<div class="cal-dot" style="background:${(TYPES[e.type]||TYPES.task).color}"></div>`).join('');
    cells+=`<button class="cal-cell${ds===Td?' today':''}${ds===calSel?' sel':''}" onclick="calSel='${ds}';renderApp()">${label}<div class="cal-dots">${dots}</div></button>`;}
  const selEvs=expandRange(calSel,calSel).sort((a,b)=>(a.time||'99').localeCompare(b.time||'99'));
  let h=`<div class="month-nav"><button class="btn-ghost" onclick="calShift(-12)">\u00AB</button><button class="btn-ghost" onclick="calShift(-1)">\u2190</button>
    <div class="month-name">${MON[LANG][calM]} ${calY}</div><button class="btn-ghost" onclick="calShift(1)">\u2192</button><button class="btn-ghost" onclick="calShift(12)">\u00BB</button></div>
    <section class="card"><div class="cal-grid">${WD_CAL[LANG].map(w=>`<div class="cal-wd">${w}</div>`).join('')}${cells}</div></section>`;
  h+=evFormOpen?evForm(calSel):`<button class="btn-main" onclick="evFormOpen=true;evEditId=null;renderApp();setTimeout(()=>{var i=document.getElementById('ev-title');if(i)i.focus()},50)">+ ${t('addOn')} ${dHuman(calSel)}</button>`;

  return h;

  const category=document.getElementById('tx-cat').value.trim()||'Прочее';
  const note=document.getElementById('tx-note').value.trim();
  if(!amount||isNaN(amount)||!date)return;
  if(txEditId)Object.assign(S.tx.find(o=>o.id===txEditId),{type:txType,amount,category,date,note});
  else S.tx.push({id:uid(),type:txType,amount,category,date,note});
  save();txFormOpen=false;txEditId=null;renderApp();
}
function startEditTx(id){const x=S.tx.find(o=>o.id===id);if(!x)return;txEditId=id;txType=x.type;txFormOpen=true;finMode='month';MK=mKey(x.date);renderApp();window.scrollTo(0,0);}
function delTx(id){const x=S.tx.find(o=>o.id===id);const idx=S.tx.indexOf(x);lastDeleted={kind:'tx',item:x,idx};S.tx.splice(idx,1);save();renderApp();showToast(t('deleted'),()=>{S.tx.splice(lastDeleted.idx,0,lastDeleted.item);save();renderApp();});}
function openBudget(){const cat=prompt(t('category')+':');if(!cat)return;const lim=parseFloat((prompt(t('limit')+', \u20BD:')||'').replace(',','.'));if(!lim||isNaN(lim))return;S.budgets.push({id:uid(),category:cat.trim(),limit:Math.abs(lim)});save();renderApp();}
function delBudget(id){S.budgets=S.budgets.filter(b=>b.id!==id);save();renderApp();}

/* ---- Заметки ---- */
function rNotes(){
  let h=`<section class="card form"><textarea class="inp area" id="note-text" rows="3" placeholder="${t('quickNote')}"></textarea><button class="btn-main" onclick="submitNote()">${t('saveNote')}</button></section>`;
  h+=S.notes.length?S.notes.map(n=>`<section class="card"><div class="note-text">${esc(n.text)}</div><div class="note-foot"><span>${dHuman(n.created)}</span><button class="x" onclick="delNote('${n.id}')">\u00D7</button></div></section>`).join(''):`<div class="empty">${t('noNotes')}</div>`;
  return h;
}
function submitNote(){const x=document.getElementById('note-text').value.trim();if(!x)return;S.notes.unshift({id:uid(),text:x,created:todayStr()});save();renderApp();}
function delNote(id){const n=S.notes.find(o=>o.id===id);const idx=S.notes.indexOf(n);lastDeleted={kind:'note',item:n,idx};S.notes.splice(idx,1);save();renderApp();showToast(t('deleted'),()=>{S.notes.splice(lastDeleted.idx,0,lastDeleted.item);save();renderApp();});}

/* ============================================================
   МЕНЮ (боковая панель)
   ============================================================ */
function openMenu(){
  let ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="drawer-back" onclick="closeMenu()"></div><div class="drawer" id="drawer">${menuHtml()}</div>`;
}
function closeMenu(){document.getElementById('overlay').innerHTML='';}
function menuHtml(){
  const st=S.settings;
  return `<h2>IMAM<span>IO</span></h2><div class="ver">v4.0 \u00B7 ${esc((profiles.find(p=>p.id===CUR)||{}).name||'')}</div>
    <div class="m-sec">${t('settings')}</div>
    <div class="m-item"><span>${t('theme')}</span><div class="seg" style="margin:0;max-width:170px">
      <button class="${THEME!=='dark'?'on':''}" onclick="setTheme('light')">${t('light')}</button>
      <button class="${THEME==='dark'?'on':''}" onclick="setTheme('dark')">${t('dark')}</button></div></div>
    <div class="m-item" style="flex-direction:column;align-items:stretch"><span style="margin-bottom:6px">${t('language')}</span>
      <div class="seg">${Object.keys(LANG_NAMES).map(l=>`<button class="${LANG===l?'on':''}" onclick="setLang('${l}')">${LANG_NAMES[l]}</button>`).join('')}</div>
      ${LANG==='kk'?`<div class="kk-note">Qaraqalpaqsha awdarma \u2014 QARALAMA. Qátelik bolsa túzet: keri baylanıs. (Каракалпакский перевод — черновик, нужна вычитка.)</div>`:''}</div>

    <div class="m-sec">${t('tools')}</div>
    <div class="m-item" onclick="openSearch()"><span>${t('search')}</span><span class="m-val">\uD83D\uDD0D</span></div>
    <div class="m-item" onclick="openGoals()"><span>${t('goals')}</span><span class="m-val">\u2192</span></div>
    <div class="m-item" onclick="openRecur()"><span>${t('recurring')}</span><span class="m-val">\u21BB</span></div>
    <div class="m-item" onclick="exportCsv()"><span>${t('exportCsv')}</span><span class="m-val">CSV</span></div>
    <div class="m-item" onclick="backupAll()"><span>${t('backupAll')}</span><span class="m-val">\u2193</span></div>

    <input type="file" id="imp" accept=".json" style="display:none" onchange="importAll(event)">
    <div class="m-sec">${t('about')}</div>
    <div class="kk-note">${t('aboutText')}</div>
    <div class="m-item" onclick="switchProfile()"><span>${t('switchProfile')}</span><span class="m-val">\u21C4</span></div>`;
}
function setTheme(x){THEME=x;S.settings.theme=x;applyTheme();lsSet(UIKEY,{theme:THEME,lang:LANG});save();openMenu();renderApp();}
function setLang(x){LANG=x;S.settings.lang=x;lsSet(UIKEY,{theme:THEME,lang:LANG});save();openMenu();renderApp();}

/* ---- поиск ---- */
function openSearch(){closeMenu();let ov=document.getElementById('overlay');
  ov.innerHTML=`<div class="voice-back" onclick="if(event.target===this)this.parentNode.innerHTML=''"><div class="voice-sheet"><input class="inp" id="srch" placeholder="${t('searchPh')}" oninput="runSearch(this.value)" autofocus><div id="srch-res" style="margin-top:12px"></div><button class="btn-ghost" style="width:100%;margin-top:12px" onclick="document.getElementById('overlay').innerHTML=''">${t('close')}</button></div></div>`;
  setTimeout(()=>{var i=document.getElementById('srch');if(i)i.focus();},60);}
function runSearch(q){
  q=q.trim().toLowerCase(); const box=document.getElementById('srch-res'); if(!box)return;
  if(!q){box.innerHTML='';return;}
  const ev=S.events.filter(e=>e.title.toLowerCase().includes(q));
  const tx=S.tx.filter(x=>x.category.toLowerCase().includes(q)||(x.note||'').toLowerCase().includes(q));
  const nt=S.notes.filter(n=>n.text.toLowerCase().includes(q));
  let h='';
  if(ev.length){h+=`<div class="search-res-h">${t('resEvents')}</div>`+ev.slice(0,8).map(e=>`<div class="ev"><div class="ev-mark" style="background:${(TYPES[e.type]||TYPES.task).color}"></div><div class="ev-body"><div class="ev-title">${esc(e.title)}</div><div class="ev-meta">${dHuman(e.date)}${e.time?' \u00B7 '+e.time:''}</div></div></div>`).join('');}
  if(tx.length){h+=`<div class="search-res-h">${t('resTx')}</div>`+tx.slice(0,8).map(x=>`<div class="tx"><div class="tx-body"><div class="tx-cat">${esc(x.category)}</div><div class="tx-meta">${dHuman(x.date)}${x.note?' \u00B7 '+esc(x.note):''}</div></div><div class="tx-sum ${x.type==='income'?'green':'red'}">${x.type==='income'?'+':'\u2212'}${money(x.amount)}</div></div>`).join('');}
  if(nt.length){h+=`<div class="search-res-h">${t('resNotes')}</div>`+nt.slice(0,8).map(n=>`<div class="note-text" style="padding:6px 0;border-bottom:1px solid var(--line)">${esc(n.text)}</div>`).join('');}
  box.innerHTML=h||`<div class="empty">${t('noResults')}</div>`;
}

/* ---- цели ---- */
function openGoals(){closeMenu();let ov=document.getElementById('overlay');ov.innerHTML=`<div class="voice-back" onclick="if(event.target===this)this.parentNode.innerHTML=''"><div class="voice-sheet" id="goals-sheet">${goalsHtml()}</div></div>`;}
function goalsHtml(){
  let h=`<div class="card-h row-between">${t('goalsTitle')}<button class="link" style="padding:0" onclick="addGoal()">+ ${t('addGoal')}</button></div>`;
  if(!S.goals.length)h+=`<div class="empty">${t('noGoals')}</div>`;
  for(const g of S.goals){const pct=Math.min(100,g.saved/g.target*100);const done=g.saved>=g.target;
    h+=`<div class="goal"><div class="goal-top"><span class="goal-title">${esc(g.title)}</span><span class="bar-sum">${money(g.saved)} / ${money(g.target)}</span></div>
      <div class="bar-track"><div class="bar-fill${done?' g':''}" style="width:${Math.max(3,pct)}%"></div></div>
      ${done?`<div class="fin-l green" style="margin-top:4px">${t('goalDone')}</div>`:''}
      <div class="goal-btns"><button onclick="goalAdj('${g.id}',1)">${t('goalAdd')}</button><button onclick="goalAdj('${g.id}',-1)">${t('goalSub')}</button><button onclick="delGoal('${g.id}')">\u00D7</button></div></div>`;}
  h+=`<button class="btn-ghost" style="width:100%;margin-top:14px" onclick="document.getElementById('overlay').innerHTML=''">${t('close')}</button>`;
  return h;
}
function addGoal(){const name=prompt(t('goalName')+':');if(!name)return;const tg=parseFloat((prompt(t('target')+', \u20BD:')||'').replace(',','.'));if(!tg||isNaN(tg))return;S.goals.push({id:uid(),title:name.trim(),target:Math.abs(tg),saved:0});save();document.getElementById('goals-sheet').innerHTML=goalsHtml();}
function goalAdj(id,sign){const g=S.goals.find(o=>o.id===id);const v=parseFloat((prompt((sign>0?t('goalAdd'):t('goalSub'))+', \u20BD:')||'').replace(',','.'));if(!v||isNaN(v))return;g.saved=Math.max(0,g.saved+sign*Math.abs(v));save();document.getElementById('goals-sheet').innerHTML=goalsHtml();}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);save();document.getElementById('goals-sheet').innerHTML=goalsHtml();}

/* ---- регулярные платежи ---- */
function openRecur(){closeMenu();let ov=document.getElementById('overlay');ov.innerHTML=`<div class="voice-back" onclick="if(event.target===this)this.parentNode.innerHTML=''"><div class="voice-sheet" id="recur-sheet">${recurHtml()}</div></div>`;}
function recurHtml(){
  let h=`<div class="card-h row-between">${t('recurring')}<button class="link" style="padding:0" onclick="addRecur()">+ ${t('addRecur')}</button></div>`;
  if(!S.recurTx.length)h+=`<div class="empty">${t('noRecur')}</div>`;
  for(const r of S.recurTx)h+=`<div class="tx"><div class="tx-body"><div class="tx-cat">${esc(r.category)}</div><div class="tx-meta">${t('recurDay')}: ${r.day} \u00B7 ${t(r.type==='income'?'income':'expense')}</div></div><div class="tx-sum ${r.type==='income'?'green':'red'}">${r.type==='income'?'+':'\u2212'}${money(r.amount)}</div><button class="x" onclick="delRecur('${r.id}')">\u00D7</button></div>`;
  h+=`<button class="btn-ghost" style="width:100%;margin-top:14px" onclick="document.getElementById('overlay').innerHTML=''">${t('close')}</button>`;
  return h;
}
function addRecur(){
  const isInc=confirm(t('income')+' ? (Отмена = '+t('expense')+')');
  const amount=parseFloat((prompt(t('sum')+', \u20BD:')||'').replace(',','.'));if(!amount||isNaN(amount))return;
  const category=(prompt(t('category')+':')||'').trim()||'Прочее';
  const day=Math.min(28,Math.max(1,parseInt(prompt(t('recurDay')+' (1-28):')||'1')||1));
  S.recurTx.push({id:uid(),type:isInc?'income':'expense',amount:Math.abs(amount),category,day,note:'',start:mKey(todayStr())});
  postRecurring();save();document.getElementById('recur-sheet').innerHTML=recurHtml();renderApp();
}
function delRecur(id){S.recurTx=S.recurTx.filter(r=>r.id!==id);save();document.getElementById('recur-sheet').innerHTML=recurHtml();}

/* ---- CSV экспорт ---- */
function exportCsv(){
  const rows=[['date','type','category','amount','note']];
  for(const x of [...S.tx].sort((a,b)=>a.date.localeCompare(b.date)))rows.push([x.date,x.type,x.category,x.amount,(x.note||'').replace(/[\n;]/g,' ')]);
  const csv='\uFEFF'+rows.map(r=>r.join(';')).join('\n');
  dl(new Blob([csv],{type:'text/csv'}),'imamio-finance-'+todayStr()+'.csv');closeMenu();
}
/* ---- бэкап всех профилей ---- */
function backupAll(){
  const data={version:4,profiles,data:{}};
  for(const p of profiles)data.data[p.id]=lsGet('imamio-data-'+p.id,{});
  dl(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),'imamio-backup-'+todayStr()+'.json');closeMenu();
}
function importAll(ev){
  const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(d&&d.profiles&&d.data){profiles=d.profiles;lsSet(PKEY,profiles);for(const id in d.data)lsSet('imamio-data-'+id,d.data[id]);showToast(t('restore')+' \u2713',null);CUR=null;lsSet(CKEY,null);closeMenu();renderApp();}
    else if(d&&Array.isArray(d.events)){S=Object.assign(S,d);save();closeMenu();renderApp();}
    else showToast('?',null);
  }catch(e){showToast('!',null);}};
  r.readAsText(f);ev.target.value='';
}
function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

/* ============================================================
   НАПОМИНАНИЯ
   ============================================================ */
function askNotify(silent){
  if(!('Notification'in window)){if(!silent)showToast(t('notSupported'),null);return;}
  if(Notification.permission==='granted'){if(!silent)showToast('\u2713',null);return;}
  Notification.requestPermission();
}
let remTimer=null;
function startReminderLoop(){if(remTimer)clearInterval(remTimer);checkReminders();remTimer=setInterval(checkReminders,30000);}
function checkReminders(){
  if(!CUR)return;const now=new Date();let changed=false;
  const from=vShiftDate(0),to=vShiftDate(1);
  for(const occ of expandRange(from,to)){
    if(occ.done||occ.remind==null||!occ.time)continue;
    const base=S.events.find(e=>e.id===occ.baseId);if(!base)continue;
    base._notified=base._notified||{}; const key=occ.date+'T'+occ.time;
    if(base._notified[key])continue;
    const [h,m]=occ.time.split(':').map(Number);const [Y,Mo,D]=occ.date.split('-').map(Number);
    const evAt=new Date(Y,Mo-1,D,h,m); const notifyAt=new Date(evAt.getTime()-occ.remind*60000);
    if(now>=notifyAt&&now<=new Date(evAt.getTime()+300000)){fireNotify(occ);base._notified[key]=true;changed=true;}
  }
  if(changed)save();
}
function fireNotify(e){
  const body=(TYPES[e.type]||TYPES.task).label()+' \u00B7 '+e.time+', '+dHuman(e.date);
  if('Notification'in window&&Notification.permission==='granted'){
    try{new Notification('Imamio: '+e.title,{body,icon:'icon-192.png'});return;}catch(err){}
    if(navigator.serviceWorker&&navigator.serviceWorker.ready){navigator.serviceWorker.ready.then(r=>r.showNotification('Imamio: '+e.title,{body,icon:'icon-192.png'})).catch(()=>{});return;}
  }
  showToast('\u23F0 '+e.title+' \u00B7 '+e.time,null);
}
function downloadICS(id,date){
  const e=S.events.find(x=>x.id===id);if(!e||!e.time)return;
  const [Y,Mo,D]=date.split('-').map(Number);const [h,m]=e.time.split(':').map(Number);
  const dt=`${Y}${vpad(Mo)}${vpad(D)}T${vpad(h)}${vpad(m)}00`;
  const end=new Date(Y,Mo-1,D,h+1,m);const dtEnd=`${end.getFullYear()}${vpad(end.getMonth()+1)}${vpad(end.getDate())}T${vpad(end.getHours())}${vpad(end.getMinutes())}00`;
  const alarm=e.remind!=null?`BEGIN:VALARM\r\nTRIGGER:-PT${e.remind||1}M\r\nACTION:DISPLAY\r\nDESCRIPTION:${e.title}\r\nEND:VALARM\r\n`:'';
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Imamio//RU\r\nBEGIN:VEVENT\r\nUID:${id}-${date}@imamio\r\nDTSTART:${dt}\r\nDTEND:${dtEnd}\r\nSUMMARY:${e.title.replace(/[\r\n]/g,' ')}\r\n${alarm}END:VEVENT\r\nEND:VCALENDAR`;
  dl(new Blob([ics],{type:'text/calendar'}),'imamio-event.ics');
}

/* ============================================================
   ТОСТ / ОТМЕНА
   ============================================================ */
let toastTimer=null;
function showToast(msg,undoFn,ms){
  const host=document.getElementById('toast-host');
  host.innerHTML=`<div class="toast"><span>${esc(msg)}</span>${undoFn?`<button onclick="doUndo()">${t('undo')}</button>`:''}</div>`;
  window._undo=undoFn||null;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{host.innerHTML='';window._undo=null;},ms||4000);
}
function doUndo(){if(window._undo)window._undo();document.getElementById('toast-host').innerHTML='';window._undo=null;}

/* ============================================================
   ВСПОМОГАТЕЛЬНОЕ (сдвиг даты — используется в списках и напоминаниях)
   ============================================================ */
function vShiftDate(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+vpad(d.getMonth()+1)+'-'+vpad(d.getDate());}

/* ============================================================
   ЗАПУСК
   ============================================================ */
if('serviceWorker'in navigator&&location.protocol==='https:')navigator.serviceWorker.register('sw.js').catch(()=>{});
if(CUR)loadProfile(CUR); else renderApp();
</script>
